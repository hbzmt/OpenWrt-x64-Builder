name: OpenWrt x86-64 Builder

on:
  workflow_dispatch:
    inputs:
      firmware_version:
        description: "OpenWrt Version (e.g. 25.12.0 / 24.10.3 / SNAPSHOT)"
        required: true
        default: "25.12.0"

      rootfs_size:
        description: "RootFS Size (MB)"
        required: true
        default: "2048"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Build Config
        run: |
          echo "===================================="
          echo "OpenWrt x86-64 Build Config"
          echo "===================================="
          echo "Firmware Version : ${{ github.event.inputs.firmware_version }}"
          echo "RootFS Size      : ${{ github.event.inputs.rootfs_size }} MB"
          echo "===================================="

      - name: Detect Download URL
        run: |
          VERSION="${{ github.event.inputs.firmware_version }}"

          echo "Firmware version: $VERSION"

          if [ "$VERSION" = "SNAPSHOT" ]; then
            TARGET_PATH="https://downloads.openwrt.org/snapshots/targets/x86/64/"
          else
            TARGET_PATH="https://downloads.openwrt.org/releases/$VERSION/targets/x86/64/"
          fi

          echo "TARGET_PATH=$TARGET_PATH" >> $GITHUB_ENV

      - name: Get ImageBuilder Filename
        run: |
          VERSION="${{ github.event.inputs.firmware_version }}"

          TARGET_PATH="https://downloads.openwrt.org/releases/${VERSION}/targets/x86/64/"

          FILE="openwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64.tar.xz"

          echo "TARGET_PATH=$TARGET_PATH" >> $GITHUB_ENV
          echo "FILE=$FILE" >> $GITHUB_ENV

          echo "Target path: $TARGET_PATH"
          echo "ImageBuilder file: $FILE"

      - name: Download ImageBuilder
        run: |
          echo "Downloading: $TARGET_PATH$FILE"

          mkdir -p openwrt
          cd openwrt

          wget "$TARGET_PATH$FILE" -O imagebuilder.tar.xz

      - name: Extract ImageBuilder
        run: |
          cd openwrt
          tar -xf imagebuilder.tar.xz

          echo "Extract done"
          ls -lah
