name: OpenWrt x86-64 Builder

on:
  workflow_dispatch:
    inputs:
      firmware_version:
        description: "OpenWrt Version (e.g. 25.12.4 / 24.10.x / SNAPSHOT)"
        required: true
        default: "25.12.4"
      lan_ip:
        description: "LAN IP (only for static, e.g. 10.0.0.99)"
        required: true
        default: "10.0.0.99"
      gateway:
        description: "Gateway (e.g. 10.0.0.2)"
        required: true
        default: "10.0.0.2"
      dns:
        description: "DNS (e.g. 10.0.0.7)"
        required: true
        default: "10.0.0.7"
      ip_mode:
        description: "IP Mode (static or dhcp)"
        required: true
        default: "static"
      rootfs_size:
        description: "RootFS Size (MB)"
        required: true
        default: "2048"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Build Config
        run: |
          echo "===================================="
          echo "OpenWrt x86-64 Build Config"
          echo "===================================="
          echo "Firmware Version : ${{ github.event.inputs.firmware_version }}"
          echo "RootFS Size      : ${{ github.event.inputs.rootfs_size }} MB"
          echo "IP Mode          : ${{ github.event.inputs.ip_mode }}"
          echo "===================================="

      - name: Validate OpenWrt Version
        run: |
          VERSION="${{ github.event.inputs.firmware_version }}"
          if [ "$VERSION" = "SNAPSHOT" ]; then
            echo "SNAPSHOT build - skip version check"
            exit 0
          fi
          URL="https://downloads.openwrt.org/releases/$VERSION/"
          echo "Checking OpenWrt version: $VERSION"
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ ERROR: Invalid OpenWrt version"
            exit 1
          fi
          echo "✅ Version valid"

      - name: Detect Download URL
        run: |
          VERSION="${{ github.event.inputs.firmware_version }}"
          if [ "$VERSION" = "SNAPSHOT" ]; then
            echo "TARGET_PATH=https://downloads.openwrt.org/snapshots/targets/x86/64/" >> $GITHUB_ENV
          else
            echo "TARGET_PATH=https://downloads.openwrt.org/releases/$VERSION/targets/x86/64/" >> $GITHUB_ENV
          fi

      - name: Get ImageBuilder Filename
        run: |
          HTML=$(curl -sL "$TARGET_PATH")
          FILE=$(echo "$HTML" | grep -oE 'openwrt-imagebuilder-[^"]*x86-64[^"]*\.tar\.zst' | head -n 1)
          if [ -z "$FILE" ]; then
            echo "❌ ERROR: ImageBuilder not found"
            echo "$HTML" | head -n 30
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "✅ Found ImageBuilder: $FILE"

      - name: Download & Extract ImageBuilder
        run: |
          mkdir -p openwrt
          cd openwrt
          wget -q --show-progress "$TARGET_PATH$FILE" -O imagebuilder.tar.zst
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst
          ls -lah

      # ====================== IP 配置 ======================
      - name: Generate network config (IP UI)
        run: |
          mkdir -p files/etc/config

          MODE="${{ github.event.inputs.ip_mode }}"
          LAN_IP="${{ github.event.inputs.lan_ip }}"
          GATEWAY="${{ github.event.inputs.gateway }}"
          DNS="${{ github.event.inputs.dns }}"

          # 复制模板
          cp files/etc/config/network.tpl files/etc/config/network || {
            echo "❌ network.tpl not found! Please make sure it exists in repository."
            exit 1
          }

          if [ "$MODE" = "dhcp" ]; then
            echo "Configuring DHCP mode..."
            sed -i 's/__PROTO__/dhcp/' files/etc/config/network
            sed -i '/__IP__/d' files/etc/config/network
            sed -i '/__GW__/d' files/etc/config/network
            sed -i '/__DNS__/d' files/etc/config/network
          else
            echo "Configuring Static IP mode..."
            sed -i 's/__PROTO__/static/' files/etc/config/network
            sed -i "s/__IP__/$LAN_IP/" files/etc/config/network
            sed -i "s/__GW__/$GATEWAY/" files/etc/config/network
            sed -i "s/__DNS__/$DNS/" files/etc/config/network
          fi

          echo "=== FINAL NETWORK CONFIG ==="
          cat files/etc/config/network
          echo "============================"

      # ====================== 构建固件 ======================
      - name: Build OpenWrt Image
        run: |
          cd openwrt/openwrt-imagebuilder-*
          echo "Copying custom files..."
          cp -r ../../files . 2>/dev/null || echo "No custom files directory found (optional)"

          ROOTFS_SIZE="${{ github.event.inputs.rootfs_size }}"

          echo "Starting build with ROOTFS_PARTSIZE=$ROOTFS_SIZE ..."
          make image \
            PROFILE="generic" \
            ROOTFS_PARTSIZE=$ROOTFS_SIZE \
            PACKAGES="luci luci-ssl luci-i18n-base-zh-cn luci-i18n-package-manager-zh-cn openssh-sftp-server" \
            FILES="files"

          echo "Build finished"
          ls -lh bin/targets/x86/64/

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-firmware
          path: openwrt/openwrt-imagebuilder-*/bin/targets/x86/64/*
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-${{ github.event.inputs.firmware_version }}
          name: OpenWrt x86-64 ${{ github.event.inputs.firmware_version }}
          files: |
            openwrt/openwrt-imagebuilder-*/bin/targets/x86/64/*generic-ext4-combined-efi.img.gz
            openwrt/openwrt-imagebuilder-*/bin/targets/x86/64/*generic-squashfs-combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
