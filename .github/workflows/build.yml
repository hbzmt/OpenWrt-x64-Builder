name: OpenWrt x86-64 Builder

on:
  workflow_dispatch:
    inputs:

      # =========================
      # 🔧 基础版本选择
      # =========================
      firmware_version:
        description: "OpenWrt Version"
        required: true
        default: "25.12.4"

      rootfs_size:
        description: "RootFS Size (MB)"
        required: true
        default: "2048"

      # =========================
      # 🌐 新增：网络参数（你这次升级的核心）
      # =========================
      lan_ip:
        description: "LAN IP (e.g. 10.0.0.99)"
        required: true
        default: "10.0.0.99"

      gateway:
        description: "Gateway (e.g. 10.0.0.2)"
        required: true
        default: "10.0.0.1"

# ⭐ GitHub Release 权限（避免 403）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 📥 拉取代码
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # 🧾 打印参数（方便调试）
      # =========================
      - name: Print Build Config
        run: |
          echo "===================================="
          echo "OpenWrt Build Config"
          echo "===================================="
          echo "Version : ${{ github.event.inputs.firmware_version }}"
          echo "RootFS  : ${{ github.event.inputs.rootfs_size }}"
          echo "LAN IP  : ${{ github.event.inputs.lan_ip }}"
          echo "Gateway : ${{ github.event.inputs.gateway }}"
          echo "===================================="

      # =========================
      # 🌍 计算下载地址
      # =========================
      - name: Detect Download URL
        run: |
          VERSION="${{ github.event.inputs.firmware_version }}"

          if [ "$VERSION" = "SNAPSHOT" ]; then
            TARGET_PATH="https://downloads.openwrt.org/snapshots/targets/x86/64/"
          else
            TARGET_PATH="https://downloads.openwrt.org/releases/$VERSION/targets/x86/64/"
          fi

          echo "TARGET_PATH=$TARGET_PATH" >> $GITHUB_ENV

      # =========================
      # 📦 获取 ImageBuilder
      # =========================
      - name: Get ImageBuilder Filename
        run: |
          echo "Fetching ImageBuilder directory..."

          HTML=$(curl -sL "$TARGET_PATH")

          FILE=$(echo "$HTML" \
            | grep -oE 'openwrt-imagebuilder-[^"]*x86-64[^"]*\.tar\.zst' \
            | head -n 1)

          if [ -z "$FILE" ]; then
            echo "ERROR: ImageBuilder not found"
            exit 1
          fi

          echo "FILE=$FILE"
          echo "FILE=$FILE" >> $GITHUB_ENV

      # =========================
      # ⬇ 下载 ImageBuilder
      # =========================
      - name: Download ImageBuilder
        run: |
          mkdir -p openwrt
          cd openwrt

          wget "$TARGET_PATH$FILE" -O imagebuilder.tar.zst

      # =========================
      # 📂 解压
      # =========================
      - name: Extract ImageBuilder
        run: |
          cd openwrt
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst

      # =========================================================
      # 🧠 ⭐ 核心升级1：动态生成 network（新增！！）
      # =========================================================
      - name: Generate network config
        run: |
          mkdir -p files/etc/config

          cat > files/etc/config/network <<EOF
config interface 'loopback'
    option device 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config device
    option name 'br-lan'
    option type 'bridge'
    list ports 'eth0'

config interface 'lan'
    option device 'br-lan'
    option proto 'static'
    option ipaddr '${{ github.event.inputs.lan_ip }}'
    option netmask '255.255.255.0'
    option gateway '${{ github.event.inputs.gateway }}'
    option dns '10.0.0.1'
    option ip6assign '60'
EOF

      # =========================================================
      # 🧠 构建固件
      # =========================================================
      - name: Build OpenWrt Image
        run: |
          cd openwrt
          cd openwrt-imagebuilder-*

          echo "Building OpenWrt Image..."

          ROOTFS_SIZE="${{ github.event.inputs.rootfs_size }}"

          make image \
            PROFILE="generic" \
            ROOTFS_PARTSIZE=$ROOTFS_SIZE \
            PACKAGES="luci luci-ssl luci-i18n-base-zh-cn luci-i18n-package-manager-zh-cn openssh-sftp-server" \
            FILES="files"

          echo "Build finished"

          find bin/targets/x86/64 -type f || true

      # =========================
      # 📦 上传 artifact
      # =========================
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-firmware
          path: openwrt/**/bin/targets/x86/64/*

      # =========================
      # 🚀 发布 Release
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: openwrt-${{ github.event.inputs.firmware_version }}
          name: OpenWrt x86-64 ${{ github.event.inputs.firmware_version }}
          files: openwrt/**/bin/targets/x86/64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
