name: OpenWrt x86-64 Builder

on:
  workflow_dispatch:
    inputs:
      firmware_version:
        description: "OpenWrt Version (e.g. 25.12.0 / 24.10.3 / SNAPSHOT)"
        required: true
        default: "25.12.0"

      rootfs_size:
        description: "RootFS Size (MB)"
        required: true
        default: "2048"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Build Config
        run: |
          echo "===================================="
          echo "OpenWrt x86-64 Build Config"
          echo "===================================="
          echo "Firmware Version : ${{ github.event.inputs.firmware_version }}"
          echo "RootFS Size      : ${{ github.event.inputs.rootfs_size }} MB"
          echo "===================================="

      - name: Detect Download URL
        run: |
          VERSION="${{ github.event.inputs.firmware_version }}"

          echo "Firmware version: $VERSION"

          if [ "$VERSION" = "SNAPSHOT" ]; then
            TARGET_URL="https://downloads.openwrt.org/snapshots/targets/x86/64/"
          else
            TARGET_URL="https://downloads.openwrt.org/releases/$VERSION/targets/x86/64/"
          fi

          echo "TARGET_URL=$TARGET_URL"
          echo "TARGET_URL=$TARGET_URL" >> $GITHUB_ENV

      - name: Get ImageBuilder Filename
        run: |
          VERSION="${{ github.event.inputs.firmware_version }}"

          BASE_URL="https://downloads.openwrt.org"

          if [ "$VERSION" = "SNAPSHOT" ]; then
            TARGET_PATH="$BASE_URL/snapshots/targets/x86/64/"
          else
            TARGET_PATH="$BASE_URL/releases/$VERSION/targets/x86/64/"
          fi

          echo "TARGET_PATH=$TARGET_PATH" >> $GITHUB_ENV

          echo "Fetching directory listing..."

          FILE=$(curl -s $TARGET_PATH | grep -oP 'openwrt-imagebuilder.*x86-64.*\.tar\.xz' | head -n 1)

          echo "ImageBuilder file: $FILE"
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Download ImageBuilder
        run: |
          echo "Downloading: $TARGET_PATH$FILE"

          mkdir -p openwrt
          cd openwrt

          wget "$TARGET_PATH$FILE" -O imagebuilder.tar.xz
